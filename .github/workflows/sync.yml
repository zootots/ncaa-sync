name: NCAA Pool Auto-Sync

on:
  schedule:
    - cron: '0,30 15-23 * * *'
    - cron: '0,30 0-4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Run sync script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NPOINT_ID: ${{ secrets.NPOINT_ID }}
        run: python3 sync.py
